<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — RetroBot CI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(10,10,10,0.90);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1e1e1e;
    }
    nav { display: flex; gap: 32px; align-items: center; }
    nav a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #888;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }

    /* ── Coming Soon ── */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      text-align: center;
      padding: 48px;
    }
    .coming-soon .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7eb8b0;
    }
    .coming-soon h1 {
      font-size: clamp(32px, 4vw, 56px);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .coming-soon p {
      font-size: 15px;
      color: #555;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #1e1e1e;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    footer img { height: 40px; width: auto; }
    footer p { font-size: 12px; color: #444; letter-spacing: 0.03em; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#works">Works</a>
    <a href="index.html#services">Services</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </nav>
</header>

<!-- ── Coming Soon ── -->
<div class="coming-soon">
  <p class="label">News</p>
  <h1>Coming Soon</h1>
  <p>We're working on it. Check back later.</p>
</div>

<!-- ── Footer ── -->
<footer>
  <a href="index.html">
    <img src="post-images/1ab44f_b4e1291ff6614694b1631f2ab912f957~mv2.png" alt="RetroBot CI">
  </a>
  <p>&copy; 2021 RetroBot Inc. All Rights Reserved.</p>
</footer>

</body>
</html>
