  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.6;

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(10,10,10,0.90);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1e1e1e;
    }
    nav { display: flex; gap: 32px; align-items: center; }
    nav a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #888;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }

    /* ── Title Section ── */
    .title-section {
      padding: 120px 48px 60px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 28px;
    }
    .title-section h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .title-section .year {
      font-size: 36px;
      font-weight: 400;
      color: #888;
    }
    .tobot-logo { height: 180px; width: auto; }
    .info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #7eb8b0;
      font-size: 16px;
    }
    .info-list li::before {
      content: "— ";
      color: #555;
    }

    /* ── Video ── */
    .video-section {
      padding: 0 48px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .video-wrapper {
      position: relative;
      aspect-ratio: 16/9;
      background: #111;
      border-radius: 4px;
      overflow: hidden;
    }
    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ── Gallery ── */
    .gallery {
      padding: 0 48px 100px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .gallery img.wide {
      width: 100%;
      border-radius: 4px;
      object-fit: cover;
    }
    .gallery .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .gallery .pair img {
      width: 100%;
      border-radius: 4px;
      object-fit: cover;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #1e1e1e;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    footer img { height: 40px; width: auto; }
    footer p { font-size: 12px; color: #444; letter-spacing: 0.03em; }
