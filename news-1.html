<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — PotenDogs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Georgia', serif;
      color: #fff;
      background: url('post-images/1ab44f_9d1aa6ba85884e8ba11142f3e956fa66~mv2.jpg') center 0/cover fixed;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* Header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(10, 12, 18, 0.88);
      backdrop-filter: blur(6px);
    }
    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      height: 56px;
    }
    nav a {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #888;
      transition: color 0.2s;
    }
    nav a:hover, nav a.active { color: #fff; font-weight: 400; }

    /* Page */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 48px 100px;
    }
    .page-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 34px;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .divider {
      width: 36px;
      height: 2px;
      background: #fff;
      margin: 16px auto 48px;
    }

    /* News list */
    .news-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .news-card {
      background: rgba(10, 12, 18, 0.80);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: row;
    }
    .news-card:hover {
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .card-img {
      width: 220px;
      min-width: 220px;
      aspect-ratio: 16/9;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .news-card:hover .card-img img { transform: scale(1.04); }
    .card-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-date {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #7eb8b0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 10px;
      color: #f0f0f0;
    }
    .card-excerpt {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .status-msg {
      text-align: center;
      color: #666;
      padding: 80px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
    }

    /* Article modal */
    #article-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #article-modal.open { display: flex; }
    .modal-box {
      background: #0e1018;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      max-width: 760px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-img {
      background: #1a1a1a;
      overflow: hidden;
    }
    .modal-img img {
      width: 100%;
      height: auto;
      display: block;
    }
    .modal-body { padding: 36px; }
    .modal-date {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #7eb8b0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .modal-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 20px;
      color: #f0f0f0;
    }
    .modal-content {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      color: #bbb;
      line-height: 1.42;
    }
    .modal-content p { margin-bottom: 0; }
    .modal-content img { width: 100%; display: block; margin: 16px 0; }
    .modal-close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 28px;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }
    .modal-close:hover { color: #fff; }
    .modal-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #2a2a2a;
    }
    .modal-footer .share-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 4px;
    }
    .share-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      text-decoration: none;
    }
    .share-btn:hover { color: #fff; border-color: #666; }
    .share-btn svg { width: 14px; height: 14px; }
    .copy-toast {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #7eb8b0;
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: 4px;
    }
    .copy-toast.show { opacity: 1; }

    /* Footer */
    footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: rgba(10,12,18,0.80);
    }
    footer img { height: 40px; width: auto; }
    footer p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="potendogs.html">PotenDogs</a>
    <a href="potendogs.html#background">Background</a>
    <a href="potendogs.html#trailer">Trailer</a>
    <a href="potendogs.html#story">Story</a>
    <a href="potendogs.html#factions">PodongNet Vs. GoldFang</a>
    <a href="potendogs.html#gallery">Gallery</a>
    <a href="news-1.html" class="active">News</a>
    <a href="potendogs.html#contact">Contact</a>
  </nav>
</header>

<div class="page-wrap">
  <h1 class="page-title">News</h1>
  <div class="divider"></div>
  <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
    <a href="potendogs-admin.html" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:12px; color:#ccc; border:1px solid #777; padding:6px 14px; border-radius:3px; transition:color 0.2s,border-color 0.2s;" onmouseover="this.style.color='#fff';this.style.borderColor='#ccc'" onmouseout="this.style.color='#ccc';this.style.borderColor='#777'">Admin</a>
  </div>
  <div class="news-grid" id="news-grid">
    <p class="status-msg">Loading...</p>
  </div>
</div>

<!-- Article modal -->
<div id="article-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-img" id="modal-img-wrap"></div>
    <div class="modal-body">
      <p class="modal-date" id="modal-date"></p>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-content" id="modal-content"></div>
      <div class="modal-footer">
        <span class="share-label">Share</span>
        <a id="share-facebook" class="share-btn" href="#" target="_blank" rel="noopener" title="Facebook">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </a>
        <a id="share-x" class="share-btn" href="#" target="_blank" rel="noopener" title="X">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a id="share-linkedin" class="share-btn" href="#" target="_blank" rel="noopener" title="LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
        <button class="share-btn" id="copy-link-btn" title="링크 복사">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <span class="copy-toast" id="copy-toast">링크 복사됨</span>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="https://retrobot.co.kr" target="_blank">
    <img src="post-images/1ab44f_85c42d5e2a684344afe9b6f1d771074f~mv2.png" alt="RetroBot">
  </a>
  <p>&copy; 2021 RetroBot Inc. All Rights Reserved.</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBJzQ7se2nnWy4PmXTymM6mUytRTqS5p_k",
    authDomain: "potendogs-news.firebaseapp.com",
    projectId: "potendogs-news",
    storageBucket: "potendogs-news.firebasestorage.app",
    messagingSenderId: "145629588211",
    appId: "1:145629588211:web:0fe6a7373bdff441616586"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function formatDate(val) {
    if (!val) return '';
    const d = val.toDate ? val.toDate() : new Date(val);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  window.closeModal = function() {
    document.getElementById('article-modal').classList.remove('open');
    document.body.style.overflow = '';
    history.pushState(null, '', window.location.pathname);
  };

  window.openArticle = function(article) {
    const imgWrap = document.getElementById('modal-img-wrap');
    imgWrap.style.display = 'none';
    imgWrap.innerHTML = '';
    document.getElementById('modal-date').textContent = formatDate(article.date);
    document.getElementById('modal-title').textContent = article.title;
    const raw = article.content || article.excerpt || '';
    const html = raw.includes('<') ? raw : raw.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
    document.getElementById('modal-content').innerHTML = html;

    const baseUrl = window.location.href.split('?')[0];
    const articleUrl = `${baseUrl}?article=${article.id}`;
    try { history.pushState({ articleId: article.id }, '', `?article=${article.id}`); } catch(e) {}
    const title = encodeURIComponent(article.title);
    const encodedUrl = encodeURIComponent(articleUrl);
    document.getElementById('share-facebook').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`;
    document.getElementById('share-x').href = `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${title}`;
    document.getElementById('share-linkedin').href = `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`;
    document.getElementById('copy-link-btn').onclick = () => {
      navigator.clipboard.writeText(articleUrl || window.location.href).then(() => {
        const toast = document.getElementById('copy-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    };
    document.getElementById('article-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  document.getElementById('article-modal').addEventListener('click', function(e) {
    if (e.target === this) window.closeModal();
  });

  async function loadArticles() {
    const grid = document.getElementById('news-grid');
    try {
      const q = query(collection(db, 'articles'), orderBy('date', 'desc'));
      const snapshot = await getDocs(q);
      const articles = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.published !== false) articles.push({ id: doc.id, ...data });
      });

      if (articles.length === 0) {
        grid.innerHTML = '<p class="status-msg">No articles yet.</p>';
        return;
      }

      grid.innerHTML = '';
      const urlArticleId = new URLSearchParams(window.location.search).get('article');
      articles.forEach(article => {
        const card = document.createElement('div');
        card.className = 'news-card';
        card.onclick = () => window.openArticle(article);
        if (urlArticleId && article.id === urlArticleId) window.openArticle(article);
        card.innerHTML = `
          <div class="card-img">
            ${article.imageUrl ? `<img src="${article.imageUrl}" alt="${article.title}" loading="lazy">` : ''}
          </div>
          <div class="card-body">
            <p class="card-date">${formatDate(article.date)}</p>
            <h3 class="card-title">${article.title}</h3>
            <p class="card-excerpt">${article.excerpt || ''}</p>
          </div>`;
        grid.appendChild(card);
      });
    } catch (err) {
      grid.innerHTML = '<p class="status-msg">Failed to load articles.</p>';
      console.error(err);
    }
  }

  loadArticles();
</script>
</body>
</html>
