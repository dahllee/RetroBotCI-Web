<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PotenDogs News</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Helvetica,Arial,sans-serif;background:#fff;color:#222;line-height:1.7}
header{background:#111;padding:16px 24px;display:flex;align-items:center;gap:16px}
header a{color:#fff;text-decoration:none;font-size:14px;opacity:.7}
header a:hover{opacity:1}
header span{color:#555}
.container{max-width:760px;margin:0 auto;padding:48px 24px 80px}
.post-date{font-size:13px;color:#999;margin-bottom:12px}
h1{font-size:28px;font-weight:700;line-height:1.3;margin-bottom:24px}
.content{font-size:16px;white-space:pre-wrap;color:#333}
#error{text-align:center;padding:80px 20px;color:#999}
#error h2{font-size:22px;margin-bottom:10px}
</style>
</head>
<body>

<header>
  <a href="index.html">RetroBot</a>
  <span>/</span>
  <a href="news-1.html">News</a>
</header>

<div class="container" id="post-container">
  <p style="color:#999">로딩 중...</p>
</div>

<script>
const SUPABASE_URL = 'https://nkexrreyofgdnfvlkwjj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rZXhycmV5b2ZnZG5mdmxrd2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODYyMjUsImV4cCI6MjA5Nzk2MjIyNX0.7TQMW2l8UqBLXdd2dnzDkgnxe5je47ttOBl7QjeFeYg';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

(async () => {
  const slug = new URLSearchParams(location.search).get('slug');
  const el = document.getElementById('post-container');
  if (!slug) { el.innerHTML = '<div id="error"><h2>포스트를 찾을 수 없습니다</h2><p>올바른 URL로 접근해 주세요.</p></div>'; return; }

  const { data, error } = await db.from('posts').select('*').eq('slug', slug).eq('published', true).single();
  if (error || !data) {
    el.innerHTML = '<div id="error"><h2>포스트를 찾을 수 없습니다</h2><p>삭제됐거나 비공개 포스트입니다.</p></div>';
    return;
  }

  document.title = data.title + ' | PotenDogs News';
  el.innerHTML = `
    <p class="post-date">${data.created_at.slice(0,10)}</p>
    <h1>${data.title}</h1>
    <div class="content">${data.content || ''}</div>`;
})();
</script>
</body>
</html>
