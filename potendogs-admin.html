<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — PotenDogs News</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    /* Quill dark theme */
    .ql-toolbar { background: #1e1e1e; border-color: #333 !important; border-radius: 4px 4px 0 0; }
    .ql-container { background: #141414; border-color: #333 !important; border-radius: 0 0 4px 4px; color: #f0f0f0; font-size: 15px; min-height: 220px; }
    .ql-editor { min-height: 220px; }
    #quill-editor { max-width: 688px; }
    .ql-editor img { max-width: 100%; margin: 12px 0; }
    .ql-editor .ql-imagepair::before { content:''; flex:1; background-image:var(--i1); background-size:cover; background-position:center; }
    .ql-editor .ql-imagepair::after  { content:''; flex:1; background-image:var(--i2); background-size:cover; background-position:center; }
    .ql-snow .ql-stroke { stroke: #aaa !important; }
    .ql-snow .ql-fill { fill: #aaa !important; }
    .ql-snow .ql-picker { color: #aaa !important; }
    .ql-snow .ql-picker-options { background: #1e1e1e; border-color: #333; }
    .ql-snow .ql-tooltip { background: #1e1e1e; border-color: #333; color: #ccc; }
    .ql-snow .ql-tooltip input { background: #111; border-color: #444; color: #f0f0f0; }

    /* Image options panel */
    #img-options-panel {
      display: none; position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
    }
    #img-options-panel.open { display: flex; }
    .img-options-box {
      background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 24px; width: 400px;
    }
    .img-options-title { font-size: 13px; color: #aaa; margin-bottom: 16px; }
    .img-option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .img-option-btn {
      background: #111; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 12px 8px; cursor: pointer; color: #777; text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .img-option-btn:hover { border-color: #888; color: #fff; }
    .img-option-btn .opt-label { font-size: 11px; margin-top: 8px; }
    .img-option-diagram { display: flex; gap: 3px; height: 28px; align-items: center; justify-content: center; }
    .opt-img { background: #555; border-radius: 2px; height: 100%; }
    .opt-txt { display: flex; flex-direction: column; gap: 3px; justify-content: center; }
    .opt-txt span { background: #333; border-radius: 1px; height: 4px; display: block; }
    #img-options-cancel {
      width: 100%; padding: 8px; background: none; border: 1px solid #2a2a2a;
      color: #555; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #img-options-cancel:hover { color: #aaa; border-color: #444; }

    /* Image edit toolbar */
    #img-edit-toolbar {
      display: none;
      position: fixed;
      z-index: 99998;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 8px;
      gap: 4px;
      align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #img-edit-toolbar.open { display: flex; }
    .img-edit-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #888;
      font-size: 10px;
      padding: 4px 7px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .img-edit-btn:hover { color: #fff; border-color: #888; }
    .img-edit-btn.active { color: #7eb8b0; border-color: #7eb8b0; }
    .img-edit-sep { width: 1px; height: 20px; background: #333; margin: 0 2px; }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* Login screen */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 48px;
      width: 360px;
    }
    .login-box h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #f0f0f0;
    }
    .login-box h1 span { color: #7eb8b0; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 10px 12px;
      color: #f0f0f0;

      font-family: inherit;

      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: #7eb8b0; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .error-msg {
      font-size: 13px;
      color: #e06c6c;
      margin-top: 12px;
      min-height: 20px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7eb8b0; color: #0a0a0a; }

    .btn-danger { background: #3a1a1a; color: #e06c6c; border: 1px solid #5a2a2a; }
    .btn-full { width: 100%; justify-content: center; margin-top: 8px; }

    /* Admin screen */
    #admin-screen { display: none; }
    .admin-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #1e1e1e;
      padding: 0 48px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #7eb8b0;
    }
    .admin-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 48px 80px;
    }

    /* Article form */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .section-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f0f0;
    }
    #article-form {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 32px;
      margin-bottom: 48px;
      display: none;
    }
    #article-form.visible { display: block; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .publish-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }
    .publish-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7eb8b0;
      cursor: pointer;
    }
    .publish-toggle label {
      font-size: 14px;
      color: #ccc;
      cursor: pointer;
    }

    /* Article list */
    .articles-list { display: flex; flex-direction: column; gap: 12px; }
    .article-row {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .article-thumb {
      width: 80px;
      height: 48px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .article-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .article-info { flex: 1; min-width: 0; }
    .article-title {
      font-size: 15px;
      font-weight: 600;
      color: #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .article-meta {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .badge-pub { background: #1a3a2a; color: #7eb8b0; }
    .badge-draft { background: #2a2a1a; color: #888; }
    .article-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .empty-msg {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 15px;
    }
  </style>
</head>

</div>

<!-- Admin screen -->
<div id="admin-screen">

    <h1>PotenDogs News Admin</h1>
    <button class="btn btn-secondary" id="logout-btn">Sign Out</button>
  </div>

  <div class="admin-wrap">
    <!-- Article form -->
    <div class="section-header">
      <h2 id="form-heading">Articles</h2>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn btn-secondary" id="import-btn" title="Import original articles from Wix">Import Original Articles</button>
        <button class="btn btn-secondary" id="migrate-btn" title="Move base64 images to GitHub">Migrate Images → GitHub</button>
        <button class="btn btn-primary" id="new-article-btn">+ New Article</button>
      </div>
    </div>
    <p id="import-status" style="font-size:13px;color:#7eb8b0;margin-bottom:16px;min-height:20px;"></p>

    <form id="article-form">
      <div class="form-row">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="art-title" placeholder="Article title" required>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="art-date" required>

      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="art-image" placeholder="https://... or post-images/filename.jpg">

    </div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
  const GH_TOKEN = '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';
  const GH_REPO = 'dahllee/PotenDogs';

  // Single image blot: preserves style attribute through Quill's delta round-trips.
  (function() {
    const Image = Quill.import('formats/image');
    class StyledImage extends Image {
      static create(value) {
        const src = (value && typeof value === 'object') ? value.src : value;
        const node = super.create(src);
        const style = (value && typeof value === 'object') ? value.style : null;
        if (style) node.setAttribute('style', style);
        return node;
      }
      static value(node) {
        return { src: node.getAttribute('src') || '', style: node.getAttribute('style') || '' };
      }
      static formats(node) {
        const f = super.formats(node);
        const style = node.getAttribute('style');
        if (style) f.style = style;
        return f;
      }
      format(name, value) {
        if (name === 'style') {
          if (value) this.domNode.setAttribute('style', value);
          else this.domNode.removeAttribute('style');
        } else { super.format(name, value); }
      }
    }
    StyledImage.blotName = 'image';
    StyledImage.tagName = 'IMG';
    Quill.register(StyledImage, true);
  })();

  // Image pair blot: two images in a flex row.
  // URLs stored in data-src1/data-src2 so they survive Quill's child-node normalization.
  (function() {
    const BlockEmbed = Quill.import('blots/block/embed');
    class ImagePairBlot extends BlockEmbed {
      static create(value) {
        const wrap = document.createElement('div');
        wrap.classList.add('ql-imagepair');
        wrap.setAttribute('contenteditable', 'false');
        wrap.setAttribute('data-src1', value.src1 || '');
        wrap.setAttribute('data-src2', value.src2 || '');
        wrap.style.display = 'flex';
        wrap.style.gap = '4px';
        wrap.style.margin = '12px 0';
        wrap.style.overflow = 'hidden';
        const s1 = (value.src1 || '').replace(/'/g, '%27');
        const s2 = (value.src2 || '').replace(/'/g, '%27');
        wrap.style.setProperty('--i1', `url('${s1}')`);
        wrap.style.setProperty('--i2', `url('${s2}')`);
        return wrap;
      }
      static value(node) {
        // Prefer data attributes (survive even if child imgs are stripped by Quill)
        const src1 = node.getAttribute('data-src1') || '';
        const src2 = node.getAttribute('data-src2') || '';
        if (src1 || src2) return { src1, src2 };
        const imgs = node.querySelectorAll('img');
        return {
          src1: imgs[0] ? imgs[0].getAttribute('src') : '',
          src2: imgs[1] ? imgs[1].getAttribute('src') : ''
        };
      }
    }
    ImagePairBlot.blotName = 'imagepair';
    ImagePairBlot.tagName = 'div';
    ImagePairBlot.className = 'ql-imagepair';
    Quill.register(ImagePairBlot);
  })();

  // Add actual <img> children to pair blots AFTER Quill has settled them in Parchment.
  // Settled leaf blots (DATA_KEY set) don't have their DOM children stripped by Quill's optimizer.
  window.addPairImgs = function() {
    window.quill.root.querySelectorAll('div.ql-imagepair').forEach(div => {
      const src1 = div.getAttribute('data-src1');
      const src2 = div.getAttribute('data-src2');
      if (!src1 && !src2) return;
      div.innerHTML = '';
      [src1, src2].forEach(src => {
        if (!src) return;
        const img = document.createElement('img');
        img.src = src;
        img.style.cssText = 'width:50%;min-width:0;flex-shrink:0;object-fit:cover;display:block;';
        div.appendChild(img);
      });
    });
  };

  async function uploadToGitHub(file) {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const filename = `${Date.now()}.${ext}`;
    const path = `post-images/news/${filename}`;
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Upload image ${filename}`, content: base64 })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Upload failed'); }
    const data = await res.json();
    return data.content.download_url;
  }

  window.quill = new Quill('#quill-editor', {
    theme: 'snow',
    modules: {
      toolbar: {
        container: [
          ['bold', 'italic', 'underline'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['image'],
          ['clean']
        ],
        handlers: {
          image: function() {
            const quill = this.quill;
            const fileInput = document.createElement('input');
            fileInput.setAttribute('type', 'file');
            fileInput.setAttribute('accept', 'image/*');
            fileInput.click();
            fileInput.onchange = () => {
              const file = fileInput.files[0];
              if (!file) return;
              const range = quill.getSelection(true);
              quill.disable();
              quill.insertText(range.index, ' [업로드 중...] ', { color: '#7eb8b0' });
              uploadToGitHub(file)
                .then(url => {
                  quill.deleteText(range.index, ' [업로드 중...] '.length);
                  quill.enable();
                  const panel = document.getElementById('img-options-panel');
                  panel.classList.add('open');
                  panel.querySelectorAll('.img-option-btn').forEach(btn => {
                    btn.onclick = () => {
                      const width = btn.dataset.width;
                      const floatVal = btn.dataset.float;
                      const margin = btn.dataset.margin;
                      const display = floatVal !== 'none' ? 'inline' : 'block';
                      const styleStr = `width:${width};float:${floatVal};margin:${margin};display:${display};`;
                      quill.insertEmbed(range.index, 'image', { src: url, style: styleStr });
                      quill.setSelection(range.index + 1);
                      panel.classList.remove('open');
                    };
                  });
                  document.getElementById('img-options-cancel').onclick = () => panel.classList.remove('open');

                  document.getElementById('img-pair-btn').onclick = () => {
                    panel.classList.remove('open');
                    const statusEl = document.getElementById('import-status');
                    const fi2 = document.createElement('input');
                    fi2.type = 'file'; fi2.accept = 'image/*';
                    fi2.onchange = () => {
                      const f2 = fi2.files[0];
                      if (!f2) return;
                      quill.disable();
                      statusEl.textContent = '두 번째 이미지 업로드 중...';
                      uploadToGitHub(f2)
                        .then(url2 => {
                          quill.enable();
                          statusEl.textContent = '';
                          quill.insertEmbed(range.index, 'imagepair', { src1: url, src2: url2 });
                          quill.setSelection(range.index + 1);
                          setTimeout(window.addPairImgs, 200);
                        })
                        .catch(err => {
                          quill.enable();
                          statusEl.textContent = '';
                          alert('업로드 실패: ' + err.message);
                        });
                    };
                    fi2.click();
                  };
                })
                .catch(err => {
                  quill.deleteText(range.index, ' [업로드 중...] '.length);
                  quill.enable();
                  alert('이미지 업로드 실패: ' + err.message);
                });
            };
          }
        }
      }
    },
    placeholder: '기사 전문을 입력하세요...'
  });

  // Strip formatting on paste
  window.quill.clipboard.addMatcher(Node.ELEMENT_NODE, (node, delta) => {
    delta.ops = delta.ops.map(op => {
      if (op.attributes) {
        delete op.attributes.bold;
        delete op.attributes.underline;
        delete op.attributes.color;
        delete op.attributes.background;
        delete op.attributes.font;
        delete op.attributes.size;
        delete op.attributes.strike;
        delete op.attributes.script;
        delete op.attributes.indent;
        delete op.attributes.align;
      }
      return op;
    });
    return delta;
  });

  // Image click → edit toolbar
  (function() {
    const toolbar = document.getElementById('img-edit-toolbar');
    let activeImg = null;

    window.quill.root.addEventListener('click', e => {
      if (e.target.tagName === 'IMG') {
        activeImg = e.target;
        const rect = activeImg.getBoundingClientRect();
        toolbar.style.left = rect.left + 'px';
        toolbar.style.top = (rect.top - 44) + 'px';
        toolbar.querySelectorAll('.img-edit-btn:not(#img-edit-delete)').forEach(btn => {
          btn.classList.toggle('active',
            activeImg.style.width === btn.dataset.width &&
            activeImg.style.float === btn.dataset.float
          );
        });
        toolbar.classList.add('open');
      } else {
        toolbar.classList.remove('open');
        activeImg = null;
      }
    });

    toolbar.querySelectorAll('.img-edit-btn:not(#img-edit-delete)').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!activeImg) return;
        const display = btn.dataset.float !== 'none' ? 'inline' : 'block';
        const styleStr = `width:${btn.dataset.width};float:${btn.dataset.float};margin:${btn.dataset.margin};display:${display};`;
        activeImg.setAttribute('style', styleStr);
        toolbar.querySelectorAll('.img-edit-btn:not(#img-edit-delete)').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    document.getElementById('img-edit-delete').addEventListener('click', () => {
      if (!activeImg) return;
      activeImg.remove();
      toolbar.classList.remove('open');
      activeImg = null;
    });

    document.addEventListener('click', e => {
      if (!toolbar.contains(e.target) && e.target.tagName !== 'IMG') {
        toolbar.classList.remove('open');
        activeImg = null;
      }
    });
  })();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, orderBy, query, Timestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBJzQ7se2nnWy4PmXTymM6mUytRTqS5p_k",
    authDomain: "potendogs-news.firebaseapp.com",
    projectId: "potendogs-news",
    storageBucket: "potendogs-news.firebasestorage.app",
    messagingSenderId: "145629588211",
    appId: "1:145629588211:web:0fe6a7373bdff441616586"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ── Auth ──
  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadArticles();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-screen').style.display = 'none';
    }
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch {
      errEl.textContent = 'Incorrect email or password.';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

  // ── Article form ──
  const articleForm = document.getElementById('article-form');
  const newBtn = document.getElementById('new-article-btn');
  const cancelBtn = document.getElementById('cancel-btn');

  newBtn.addEventListener('click', () => {
    resetForm();
    articleForm.classList.add('visible');
    document.getElementById('form-heading').textContent = 'New Article';
    newBtn.style.display = 'none';
  });

  cancelBtn.addEventListener('click', () => {
    articleForm.classList.remove('visible');
    document.getElementById('form-heading').textContent = 'Articles';
    newBtn.style.display = '';
    resetForm();
  });

  function resetForm() {
    document.getElementById('art-id').value = '';
    document.getElementById('art-title').value = '';
    document.getElementById('art-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('art-image').value = '';
    document.getElementById('art-excerpt').value = '';
    window.quill.root.innerHTML = '';
    document.getElementById('art-published').checked = true;
  }

  articleForm.addEventListener('submit', async e => {
    e.preventDefault();
    // Clone editor DOM and convert pair blots → viewer format (img children) before saving
    const editorClone = window.quill.root.cloneNode(true);
    editorClone.querySelectorAll('div.ql-imagepair').forEach(div => {
      const src1 = div.getAttribute('data-src1') || '';
      const src2 = div.getAttribute('data-src2') || '';
      div.style.cssText = 'display:flex;gap:4px;margin:12px 0;overflow:hidden;';
      div.innerHTML = '';
      [src1, src2].forEach(src => {
        if (!src) return;
        const img = document.createElement('img');
        img.setAttribute('src', src);
        img.style.cssText = 'width:50%;min-width:0;flex-shrink:0;object-fit:cover;display:block;';
        div.appendChild(img);
      });
    });
    const rawContent = editorClone.innerHTML;
    const id = document.getElementById('art-id').value;
    const dateStr = document.getElementById('art-date').value;
    const data = {
      title: document.getElementById('art-title').value.trim(),
      date: Timestamp.fromDate(new Date(dateStr)),
      imageUrl: document.getElementById('art-image').value.trim(),
      excerpt: document.getElementById('art-excerpt').value.trim(),
      content: rawContent === '<p><br></p>' ? '' : rawContent,
      published: document.getElementById('art-published').checked,
      updatedAt: Timestamp.now()
    };

    try {
      if (id) {
        await updateDoc(doc(db, 'articles', id), data);
      } else {
        data.createdAt = Timestamp.now();
        await addDoc(collection(db, 'articles'), data);
      }
      cancelBtn.click();
      loadArticles();
    } catch (err) {
      alert('Failed to save article: ' + err.message);
    }
  });

  // ── Article list ──
  async function loadArticles() {
    const list = document.getElementById('articles-list');
    list.innerHTML = '<p class="empty-msg">Loading...</p>';
    try {
      const q = query(collection(db, 'articles'), orderBy('date', 'desc'));
      const snapshot = await getDocs(q);
      if (snapshot.empty) {
        list.innerHTML = '<p class="empty-msg">No articles yet. Click "+ New Article" to get started.</p>';
        return;
      }
      list.innerHTML = '';
      snapshot.forEach(docSnap => {
        const a = { id: docSnap.id, ...docSnap.data() };
        const row = document.createElement('div');
        row.className = 'article-row';
        const dateStr = a.date ? (a.date.toDate ? a.date.toDate() : new Date(a.date)).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '';
        row.innerHTML = `
          <div class="article-thumb">
            ${a.imageUrl ? `<img src="${a.imageUrl}" alt="">` : ''}
          </div>
          <div class="article-info">
            <div class="article-title">${a.title}</div>
            <div class="article-meta">${dateStr} &nbsp;·&nbsp; <span class="badge ${a.published !== false ? 'badge-pub' : 'badge-draft'}">${a.published !== false ? 'Published' : 'Draft'}</span></div>
          </div>
          <div class="article-actions">
            <button class="btn btn-secondary" data-edit="${a.id}">Edit</button>
            <button class="btn btn-danger" data-delete="${a.id}">Delete</button>
          </div>`;
        list.appendChild(row);
      });

      list.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => editArticle(btn.dataset.edit));
      });
      list.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteArticle(btn.dataset.delete));
      });
    } catch (err) {
      list.innerHTML = '<p class="empty-msg">Failed to load articles.</p>';
      console.error(err);
    }
  }

  async function editArticle(id) {
    const snapshot = await getDocs(collection(db, 'articles'));
    let articleData = null;
    snapshot.forEach(d => { if (d.id === id) articleData = { id: d.id, ...d.data() }; });
    if (!articleData) return;

    resetForm();
    document.getElementById('art-id').value = articleData.id;
    document.getElementById('art-title').value = articleData.title || '';
    const d = articleData.date ? (articleData.date.toDate ? articleData.date.toDate() : new Date(articleData.date)) : new Date();
    document.getElementById('art-date').value = d.toISOString().split('T')[0];
    document.getElementById('art-image').value = articleData.imageUrl || '';
    document.getElementById('art-excerpt').value = articleData.excerpt || '';
    const rawContent = articleData.content || '';
    if (rawContent) {
      // Strip img children from pair divs before clipboard conversion,
      // otherwise clipboard processes each <img> as a separate image block.
      const doc = new DOMParser().parseFromString(rawContent, 'text/html');
      // Match by class OR by data-src1/data-src2 (old saves may lack the class)
      doc.querySelectorAll('div.ql-imagepair, div[data-src1], div[data-src2]').forEach(div => {
        const imgs = div.querySelectorAll('img');
        const src1 = div.getAttribute('data-src1') || (imgs[0] ? imgs[0].getAttribute('src') : '');
        const src2 = div.getAttribute('data-src2') || (imgs[1] ? imgs[1].getAttribute('src') : '');
        div.classList.add('ql-imagepair');
        div.setAttribute('data-src1', src1);
        div.setAttribute('data-src2', src2);
        div.innerHTML = '';
      });
      window.quill.clipboard.dangerouslyPasteHTML(doc.body.innerHTML);
      setTimeout(window.addPairImgs, 200);
    } else {
      window.quill.root.innerHTML = '';
    }
    document.getElementById('art-published').checked = articleData.published !== false;

    articleForm.classList.add('visible');
    document.getElementById('form-heading').textContent = 'Edit Article';
    newBtn.style.display = 'none';
    articleForm.scrollIntoView({ behavior: 'smooth' });
  }

  async function deleteArticle(id) {
    if (!confirm('Delete this article? This cannot be undone.')) return;
    try {
      await deleteDoc(doc(db, 'articles', id));
      loadArticles();
    } catch (err) {
      alert('Failed to delete: ' + err.message);
    }
  }

  // ── Bulk import ──
  const wixArticles = [

    { title: "Stepped In Poo — The Epic Musical Song of PotenDogs", excerpt: "In 2021, I Stepped In Poo, one of the epic OSTs from PotenDogs took Korea by storm. Its video clips recorded over 18 million views on YouTube, in just a month of time. I Stepped In Poo ranked No.13 on OST Chart of online music streaming service, and ranked in TOP 100th of the General Music Chart for the first time as Korean animation OST.", imageUrl: "post-images/news/stepped-in-poo-song.jpg", date: new Date("2021-08-03T01:58:34.429Z") },
    { title: "PotenDogs winning awards at International Film Festivals", excerpt: "PotenDogs won 'Outstanding Achievement Award' at the Animalis Fabula Film Festival 2021 in Texas, US. The judge's aggregate score for PotenDogs at the Animalis Fabula is 8.9 out of 10.", imageUrl: "post-images/news/winning-awards-festivals.jpg", date: new Date("2021-11-30T04:47:48.811Z") },
    { title: "Stepped In Poo — 2nd Most Loved Video on YouTube 2021 Korea", excerpt: "I Stepped In Poo, the iconic musical song from PotenDogs, ranked the 2nd most viewed video clip on YouTube in Korea throughout 2021, ahead of many famous K-Pop songs.", imageUrl: "post-images/news/stepped-in-poo-2nd-youtube.jpg", date: new Date("2021-12-24T04:09:22.669Z") },
    { title: "Distribution Agreement of PotenDogs made with Millimages", excerpt: "RetroBot has made a distribution agreement of PotenDogs with Millimages, the well-known French Animation Studio & Distributor. Distribution territory includes French speaking countries, Eastern Europe, Northern Europe and China.", imageUrl: "post-images/news/millimages-distribution.png", date: new Date("2022-04-12T06:58:51.415Z") },
    { title: "PotenDogs Nominated in Three Categories at the Buffalo Dreams Fantastic Film Festival", excerpt: "PotenDogs has been nominated in three categories—Outstanding International Feature, Outstanding Science Fiction Feature, and Outstanding Animated Film—at the 2022 Buffalo Dreams Fantastic Film Festival, to be held in Buffalo, New York.", imageUrl: "post-images/news/buffalo-dreams-festival.png", date: new Date("2022-07-24T15:00:00.000Z") },
    { title: "PotenDogs Wins the Best Animated Feature Film Award at the Montevideo World Film Festival", excerpt: "PotenDogs won the \"Best Animated Feature Film\" award at the Montevideo World Film Festival, held in Montevideo, Uruguay, on July 7, 2022.", imageUrl: "post-images/news/montevideo-festival.jpg", date: new Date("2022-07-07T15:03:22.206Z") },
    { title: "PotenDogs Wins the Best of Show Award at the Nature Without Borders International Film Festival", excerpt: "PotenDogs won the \"Best of Show\" award at the 5th Nature Without Borders International Film Festival, held on July 16 in Lewes, Delaware.", imageUrl: "post-images/news/nature-without-borders-festival.jpg", date: new Date("2022-07-17T15:00:00.000Z") },
    { title: "PotenDogs Received an Honorable Mention at the Venice Fullshot Film Festival", excerpt: "PotenDogs received an Honorable Mention in the Best Animation category at the Venice Fullshot Film Festival, held on September 7 in Venice, Italy.", imageUrl: "post-images/news/venice-fullshot-festival.webp", date: new Date("2022-09-07T15:00:00.000Z") },
    { title: "PotenDogs Wins the Silver Remi Award at the Houston International Film Festival", excerpt: "PotenDogs won the Silver Remi Award in the Feature - Anime / Manga category at the 2023 Houston International Film Festival, held on April 25 in Houston, Texas.", imageUrl: "post-images/news/houston-silver-remi.jpg", date: new Date("2023-04-25T15:00:00.000Z") },

    { title: "Isabella Tugman Nominated for Best Female Character Performance at the 2025 OneVoice Awards", excerpt: "Isabella Tugman, who voices both Hwan's mother and the character Cloud in the English version of PotenDogs, has been nominated for the Best Female Character Performance award at the 2025 OneVoice Awards.", imageUrl: "post-images/news/onevoice-tugman.jpg", date: new Date("2025-05-09T09:54:01.000Z") },
    { title: "PotenDogs Inks Broadcast Deals with U.S. KAOZ TV and Umaxx", excerpt: "Man Smiling Moving Pictures, the distributor of the English version of PotenDogs, announced that it has signed broadcasting agreements with U.S.-based FAST channel KAOZ TV and OTT/IPTV operator UMAXX.", imageUrl: "post-images/news/kaoz-umaxx.jpg", date: new Date("2025-05-18T10:11:36.000Z") },
    { title: "PotenDogs Secures U.S. Broadcast Deal with DogTV", excerpt: "Man Smiling Moving Pictures, the distributor of the English version of PotenDogs, announced that it has signed a broadcast agreement with DogTV in the United States.", imageUrl: "post-images/news/dogtv.webp", date: new Date("2025-06-06T12:28:04.000Z") },
    { title: "PotenDogs Secures U.S. Broadcast Deal with StashTV", excerpt: "Man Smiling Moving Pictures, the distributor of the English version of PotenDogs, announced that it has signed a broadcast agreement with U.S. FAST channel StashTV.", imageUrl: "post-images/news/stashtv.png", date: new Date("2025-06-18T12:36:04.000Z") },
    { title: "WA2S Films Signs Broadcast Deal with Fawesome TV for PotenDogs English Version", excerpt: "WA2S Films Signs Broadcast Deal with Fawesome TV for PotenDogs English Version.", imageUrl: "post-images/news/fawesome.png", date: new Date("2025-07-28T02:30:53.000Z") },
  ];

  document.getElementById('import-btn').addEventListener('click', async () => {
    if (!confirm(`Import ${wixArticles.length} original articles from Wix? This will add them alongside any existing articles.`)) return;
    const statusEl = document.getElementById('import-status');
    const btn = document.getElementById('import-btn');
    btn.disabled = true;
    statusEl.textContent = 'Importing...';
    let count = 0;
    try {
      for (const a of wixArticles) {
        await addDoc(collection(db, 'articles'), {
          title: a.title,
          excerpt: a.excerpt,
          content: a.excerpt,
          imageUrl: a.imageUrl,
          date: Timestamp.fromDate(a.date),
          published: true,
          createdAt: Timestamp.now()
        });
        count++;
        statusEl.textContent = `Importing... (${count}/${wixArticles.length})`;
      }
      statusEl.textContent = `✓ ${count} articles imported successfully.`;
      loadArticles();
    } catch (err) {
      statusEl.textContent = `Error after ${count} articles: ${err.message}`;

    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('migrate-btn').addEventListener('click', async () => {
    if (!confirm('모든 기사의 base64 이미지를 GitHub로 옮깁니다. 계속할까요?')) return;
    const statusEl = document.getElementById('import-status');
    const btn = document.getElementById('migrate-btn');
    btn.disabled = true;
    statusEl.textContent = '마이그레이션 시작...';

    try {
      const snapshot = await getDocs(collection(db, 'articles'));
      let updated = 0;
      for (const docSnap of snapshot.docs) {
        const data = docSnap.data();
        let content = data.content || '';
        if (!content.includes('data:image')) continue;

        const parser = new DOMParser();
        const dom = parser.parseFromString(content, 'text/html');
        const imgs = dom.querySelectorAll('img[src^="data:"]');
        if (imgs.length === 0) continue;

        statusEl.textContent = `"${data.title}" 처리 중... (${imgs.length}개 이미지)`;

        for (const img of imgs) {
          const dataUrl = img.getAttribute('src');
          const mime = dataUrl.match(/data:([^;]+);/)?.[1] || 'image/jpeg';
          const ext = mime.split('/')[1].replace('jpeg', 'jpg');
          const base64 = dataUrl.split(',')[1];
          const filename = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const path = `post-images/news/${filename}`;

          const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `Migrate image ${filename}`, content: base64 })
          });
          if (!res.ok) throw new Error('GitHub 업로드 실패');
          const ghData = await res.json();
          img.setAttribute('src', ghData.content.download_url);
        }

        const newContent = dom.body.innerHTML;
        await updateDoc(doc(db, 'articles', docSnap.id), { content: newContent, updatedAt: Timestamp.now() });
        updated++;
      }
      statusEl.textContent = `✓ ${updated}개 기사 마이그레이션 완료.`;
      loadArticles();
    } catch (err) {
      statusEl.textContent = '오류: ' + err.message;
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
